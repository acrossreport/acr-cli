name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: acr-windows-x86_64.zip
            binary: acr.exe

          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: acr-linux-x86_64.tar.gz
            binary: acr

          - target: x86_64-apple-darwin
            os: macos-latest
            archive: acr-macos-x86_64.tar.gz
            binary: acr

          - target: aarch64-apple-darwin
            os: macos-latest
            archive: acr-macos-aarch64.tar.gz
            binary: acr

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ matrix.archive }} ${{ matrix.binary }}

      - name: Package (Linux / macOS)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.archive }} ${{ matrix.binary }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive }}
