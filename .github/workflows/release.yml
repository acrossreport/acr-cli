name: Release
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: acr-windows-x86_64.zip
            runtime_bin: axr_runtime.dll
            layout_bin: axr_layout.dll
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: acr-macos-aarch64.tar.gz
            runtime_bin: libaxr_runtime.dylib
            layout_bin: libaxr_layout.dylib
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: acr-linux-x86_64.tar.gz
            runtime_bin: libaxr_runtime.so
            layout_bin: libaxr_layout.so
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ matrix.archive }} ${{ matrix.runtime_bin }} ${{ matrix.layout_bin }}
      - name: Package (macOS / Linux)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.archive }} ${{ matrix.runtime_bin }} ${{ matrix.layout_bin }}
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive }}
